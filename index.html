<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="LToBank">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <meta name="google-signin-client_id" content="35323267785-oqueflp0he6ot8jphtq8dqobpt6k2hp7.apps.googleusercontent.com">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>lto_bank_app</title>
  <link rel="manifest" href="manifest.json">

  <style>
    #loading-indicator {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0F172A;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      color: white;
      font-family: sans-serif;
      text-align: center;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid rgba(255, 255, 255, 0.1);
      border-top: 5px solid #6366f1;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    .message {
      font-size: 1.1rem;
      line-height: 1.6;
      opacity: 0.9;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="loading-indicator">
    <div class="spinner"></div>
    <div class="message">금고 열쇠를 찾는 중입니다...<br>(동전 하나하나 세고 있어요! 💰)</div>
  </div>

  <script>
    window.addEventListener('load', function(ev) {
      var observer = new MutationObserver(function(mutations) {
        mutations.forEach(function(mutation) {
          if (mutation.addedNodes.length > 0) {
            for (var i = 0; i < mutation.addedNodes.length; i++) {
              if (mutation.addedNodes[i].nodeName === 'FLT-GLASS-PANE') {
                var loader = document.getElementById('loading-indicator');
                if (loader) loader.remove();
                observer.disconnect();
              }
            }
          }
        });
      });
      observer.observe(document.body, { childList: true });
      setTimeout(function() {
        var loader = document.getElementById('loading-indicator');
        if (loader) loader.remove();
      }, 30000);
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
